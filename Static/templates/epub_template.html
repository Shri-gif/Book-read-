<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="epub_template.css">
</head>
<body>
    <div class="title-page">
        <h1>{{TITLE}}</h1>
        <h2>by {{AUTHOR}}</h2>
    </div>
    
    <div class="copyright">
        <p>Copyright © {{YEAR}} {{PUBLISHER}}</p>
        <p>ISBN: {{ISBN}}</p>
    </div>
    
    <div class="preface">{{PREFACE}}</div>
    
    <div class="toc">
        <h2>Table of Contents</h2>
        <!-- TOC will be auto-generated -->
    </div>
    
    <div class="content">
        {{CONTENT}}
    </div>
</body>
</html>
